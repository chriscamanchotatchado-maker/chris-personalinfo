<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Profile</title>

  <!-- Google Font for cute style -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Poppins&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(to bottom, #ffe4ec, #ffd6e8);
      text-align: center;
      padding: 30px;
    }

    .card {
      background: #fff0f5;
      padding: 25px;
      border-radius: 25px;
      box-shadow: 0 8px 20px rgba(255, 105, 180, 0.3);
      max-width: 400px;
      margin: auto;
      border: 2px solid #ffb6c1;
    }

    img {
      width: 150px;
      height: 150px;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid #ff69b4;
      margin-bottom: 15px;
    }

    h2 {
      font-family: 'Playfair Display', serif;
      color: #d63384;
      margin: 10px 0;
    }

    p {
      margin: 6px 0;
      color: #6a1b4d;
      font-size: 14px;
    }

    strong {
      color: #ff1493;
    }

    .decor {
      font-size: 20px;
      margin-bottom: 10px;
    }
  </style>
</head>

<body>

  <div class="card">
